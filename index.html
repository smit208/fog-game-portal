<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FOG Game Portal — Game selection and pattern grid engine built by Smit Prajapati." />
    <meta name="theme-color" content="#0a0a0f" />
    <title>FOG | Game Portal</title>

    <!-- Inline loader so there's zero blank-white flash on first paint -->
    <style>
      html, body { margin: 0; padding: 0; background: #0a0a0f; }
      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0a0a0f;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #app-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .loader-ring {
        width: 36px; height: 36px;
        border: 3px solid rgba(124,58,237,0.2);
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loader fades out once React mounts (see main.jsx) -->
    <div id="app-loader"><div class="loader-ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
